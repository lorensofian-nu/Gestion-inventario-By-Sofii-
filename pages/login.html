<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Inicio de sesion</title>
    <link rel="stylesheet" href="../css/login.css">
</head>
<main id="contenedor">
    <form id="formulario">
        <h1 id="titulo"> Inicio de sesion </h1>
        <img src="../images/esponja.png" alt="logo">
        <p> por favor digite sus datos correctamente </p>
        <div class="inicioSesion">
            <label for="nombre">Digite su nombre nombre completo</label>
            <input type="text" id="nombre" name="nombre" placeholder="nombre" />
        </div>
        <div class="inicioSesion">
            <label for="identificacion">Digite su numero de identificacion </label>
            <input type="text" id="identificacion" name="identificacion" placeholder="identificacion" />
        </div>
        <div class="inicioSesion">
            <label for="password">Digite su contraseña</label>
            <input type="password" id="password" name="password" placeholder="contraseña" />
        </div>
        <button type="submit" id="IniciarSesion"> Iniciar sesion</button>
        <a href="../index.html">No tienes cuenta? Registrarse</a>
    </form>
</main>
<script src="../js/login.js"></script>

</body>

</html>
