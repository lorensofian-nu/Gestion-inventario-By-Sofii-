<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario By Sofiii</title>
    <link rel="stylesheet" href="css/registrar.css">
</head>

<body>

    <nav class="menu-principal">
        <div class="menu-links">
            <a href="usuario.html">Home</a>
            <a href="usuario.html">Registrar usuarios</a>
            <a href="registrar.html#registro">Registro de productos</a>
        </div>
    </nav>

    <main id="contenedor">
        <h1 id="titulo">Inventario</h1>

        <form id="formulario">
            <input type="text" id="nombre" name="nombre" placeholder="Nombre" >
            <input type="text" id="codigo" name="codigo" placeholder="Codigo" >
            <input type="text" id="proveedor" name="proveedor" placeholder="Proveedor" >
            <input type="number" id="stock" name="stock" placeholder="Stock">

            <select id="tipo">
                <option value="materia-prima">Materia Prima</option>
                <option value="terminado">Producto Terminado</option>
            </select>

            <button type="submit" id="guardarProducto">Guardar</button>
        </form>

        <div class="buscarProducto">
            <input type="text" id="buscar" placeholder=" Buscar productosss">
        </div>

        <div class="tablaProductos">
            <table>
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Código</th>
                        <th>Proveedor</th>
                        <th>Tipo</th>
                        <th>Stock</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="lista-productos">
                    <tr>
                        <td>oreo</td>
                        <td>2344</td>
                        <td>by sofii</td>
                        <td>Materia Prima</td>
                        <td>25</td>
                        <td>
                            <button class="editar">Editar</button>
                            <button class="eliminar">Eliminar</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script src="js/productos.js"></script>
</body>

</html>
