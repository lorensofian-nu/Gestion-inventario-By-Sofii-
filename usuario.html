<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion inventario By Sofiiii </title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <main id="contenedor">
        <form id="formulario">
            <h1 id="titulo"> Registro de Usuario</h1>
            <img src="../images/cand.webp" alt="logo">
            <p> por favor digite sus datos correctamente </p>
            <div class="inicioSesion">
                <label for="nombre">Digite su nombre nombre completo</label>
                <input type="text" id="nombre" name="nombre" placeholder="nombre" />
            </div>
            <div class="inicioSesion">
                <label for="identificacion">Digite su numero de identificacion </label>
                <input type="text" id="identificacion" name="identificacion" placeholder="identificacion" />
            </div>
            <div class="inicioSesion">
                <label for="cargo">Digite su cargo</label>
                <input type="text" id="cargo" name="cargo" placeholder="cargo" />
            </div>

            <div class="inicioSesion">
                <label for="password">Digite su contraseña</label>
                <input type="password" id="password" name="password" placeholder="contraseña" />
            </div>
            <button type="submit" id="registrar"> Registrar </button>
            <p id="olvidar"> Olvidaste tu contraseña ?</p>
        </form>
    </main>
    <script src="js/usuario.js"></script>
</body>

</html>
